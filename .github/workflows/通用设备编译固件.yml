name: 通用设备编译固件

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select the source branch"
        required: false
        default: "openwrt-main"
        type: choice
        options:
          - openwrt-main
          - lede-master
          - immortalwrt-master
          - Lienol-master
      
env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Init environment
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake git libncurses5-dev python2
          sudo timedatectl set-timezone "$TZ"

      - name: Create SWAP
        run: |
          sudo fallocate -l 2G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

      - name: Clone source
        working-directory: /workdir
        run: |
          git clone --depth 1 https://github.com/coolsnowwolf/lede openwrt

      - name: Default config
        run: |
          cd openwrt
          echo "CONFIG_TARGET_armvirt=y" > .config
          echo "CONFIG_TARGET_armvirt_64=y" >> .config

      - name: Compile
        run: |
          cd openwrt
          make defconfig
          make download -j8
          make -j$(nproc) V=s || make -j1 V=s

      # ✅ 绝对安全路径，绝不会上传系统目录
      - name: Get firmware path
        id: getpath
        run: |
          cd openwrt/bin/targets/armvirt/64
          echo "path=$PWD" >> $GITHUB_OUTPUT

      # ✅ 只上传固件，不碰系统目录
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ steps.getpath.outputs.path }}

      # ✅ 你的 message（发布说明）
      - name: Release message
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.run_id }}
          body: |
            UFI003 OpenWrt 固件
            架构：arm64
            IP：192.168.1.1
            账号：root / password
          artifacts: ${{ steps.getpath.outputs.path }}/*
